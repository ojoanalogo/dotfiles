[module/menu]
type = custom/menu

; If true, <label-toggle> will be to the left of the menu items (default).
; If false, it will be on the right of all the items.
expand-right = true
click-right = ~/.config/rofi/menus/appmenu &

; "menu-LEVEL-N" has the same properties as "label-NAME" with
; the additional "exec" property
;
; Available exec commands:
;   menu-open-LEVEL
;   menu-close
; Other commands will be executed using "/usr/bin/env sh -c $COMMAND"

menu-0-0 ="пӨӨ Power"
;menu-0-0-background = ${color.foreground}
menu-0-0-foreground = ${color.red}
menu-0-0-exec = ~/.config/rofi/menus/power_menu &

menu-0-1 ="оҖ… Menu"
menu-0-1-foreground = ${color.foreground}
menu-0-1-exec = ~/.config/rofi/menus/appmenu &

menu-0-2 ="оҮЎ Files"
menu-0-2-foreground = ${color.gray}
menu-0-2-exec = thunar &

menu-0-3 ="оҮ¬ Term"
menu-0-3-foreground = ${color.blue-gray}
menu-0-3-exec = alacritty &

menu-0-4 ="пЁҖ Telegram"
menu-0-4-foreground = ${color.blue}
menu-0-4-exec = telegram-desktop &

menu-0-5 ="оҠҠ Browser"
menu-0-5-foreground = ${color.green}
menu-0-5-exec = microsoft-edge-stable &

menu-0-6 ="п‘Ј Dashboard"
menu-0-6-foreground = ${color.teal}
menu-0-6-exec = ~/.config/eww/scripts/openSysTray &


; Available tags:
;   <label-toggle> (default) - gets replaced with <label-(open|close)>
;   <menu> (default)
; Note that if you use <label-toggle> you must also include
; the definition for <label-open>

format = <label-toggle><menu>

label-open = пҢғ
label-open-foreground = ${color.foreground}
label-open-padding = 1
label-close = пҒ 
label-close-foreground = ${color.foreground}
label-close-padding = 1

; Optional item separator
; Default: none
label-separator = " / "
label-separator-foreground = ${color.sep}

