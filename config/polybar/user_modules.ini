; author: https://forum.archlabslinux.com/t/polybar-clickable-date-module/5336

[module/clickdate]
type = custom/script
; Available tags:
;   <label> (default)
format = <label>
format-prefix = "п—Ҝ  "
format-prefix-foreground = ${color.gray}

exec = date +'%d/%m %I:%M %p'
tail = false
interval = 5
click-left = ~/.config/eww/scripts/openCalendar &

