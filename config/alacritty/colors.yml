#######################################
##      START OF COLOR SCHEMES       ##
#######################################
schemes:
  ### My theme ###
  DarkForest: &DarkForest
    primary:
      background: '#0b151b'
      foreground: '#decec8'
    cursor:
      text:       '#0b151b'
      cursor:     '#decec8'
    normal:
      black:      '#0b151b'
      red:        '#B68D74'
      green:      '#617784'
      yellow:     '#329993'
      blue:       '#689992'
      magenta:    '#98A29B'
      cyan:       '#AFB2AF'
      white:      '#decec8'
    bright:
      black:      '#9b908c'
      red:        '#B68D74'
      green:      '#617784'
      yellow:     '#329993'
      blue:       '#689992'
      magenta:    '#98A29B'
      cyan:       '#AFB2AF'
      white:      '#decec8'

  everblush: &everblush
    # Default colors
    primary:
      background: "0x141b1e"
      foreground: "0xdadada"

    # Colors the cursor will use if `custom_cursor_colors` is true
    cursor:
      text: "0xd6d6d6"
      cursor: "0x3b4244"

    # Normal colors
    normal:
      black: "0x232a2d"
      red: "0xe57474"
      green: "0x8ccf7e"
      yellow: "0xe5c76b"
      blue: "0x67b0e8"
      magenta: "0xc47fd5"
      cyan: "0x6cbfbf"
      white: "0xb3b9b8"

    # Bright colors
    bright:
      black: "0x2d3437"
      red: "0xef7e7e"
      green: "0x96d988"
      yellow: "0xf4d67a"
      blue: "0x71baf2"
      magenta: "0xce89df"
      cyan: "0x67cbe7"
      white: "0xbdc3c2"

  latte: &latte

    # Default colors
    primary:
      background: '#EFF1F5' # base
      foreground: '#4C4F69' # text
      # Bright and dim foreground colors
      dim_foreground: '#4C4F69' # text
      bright_foreground: '#4C4F69' # text

    # Cursor colors
    cursor:
      text: '#EFF1F5' # base
      cursor: '#DC8A78' # rosewater
    vi_mode_cursor:
      text: '#EFF1F5' # base
      cursor: '#7287FD' # lavender

    # Search colors
    search:
      matches:
        foreground: '#EFF1F5' # base
        background: '#6C6F85' # subtext0
      focused_match:
        foreground: '#EFF1F5' # base
        background: '#40A02B' # green
      bar:
        foreground: '#EFF1F5' # base
        background: '#6C6F85' # subtext0

    # Keyboard regex hints
    hints:
      start:
        foreground: '#EFF1F5' # base
        background: '#DF8E1D' # yellow
      end:
        foreground: '#EFF1F5' # base
        background: '#6C6F85' # subtext0

    # Selection colors
    selection:
      text: '#EFF1F5' # base
      background: '#DC8A78' # rosewater

    # Normal colors
    normal:
      black:   '#5C5F77' # subtext1
      red:     '#D20F39' # red
      green:   '#40A02B' # green
      yellow:  '#DF8E1D' # yellow
      blue:    '#1E66F5' # blue
      magenta: '#EA76CB' # pink
      cyan:    '#179299' # teal
      white:   '#ACB0BE' # surface2

    # Bright colors
    bright:
      black:   '#6C6F85' # subtext0
      red:     '#D20F39' # red
      green:   '#40A02B' # green
      yellow:  '#DF8E1D' # yellow
      blue:    '#1E66F5' # blue
      magenta: '#EA76CB' # pink
      cyan:    '#179299' # teal
      white:   '#BCC0CC' # surface1

    # Dim colors
    dim:
      black:   '#5C5F77' # subtext1
      red:     '#D20F39' # red
      green:   '#40A02B' # green
      yellow:  '#DF8E1D' # yellow
      blue:    '#1E66F5' # blue
      magenta: '#EA76CB' # pink
      cyan:    '#179299' # teal
      white:   '#ACB0BE' # surface2

    indexed_colors:
      - { index: 16, color: '#FE640B' }
      - { index: 17, color: '#DC8A78' }



